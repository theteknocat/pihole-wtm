services:
  pihole-wtm:
    build: .
    container_name: pihole-wtm
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-8080}:80"
    volumes:
      - pihole-wtm-data:/app/data
    environment:
      - PIHOLE_API_URL=${PIHOLE_API_URL:-}
      - PIHOLE_API_PASSWORD=${PIHOLE_API_PASSWORD:-}
      - SESSION_TIMEOUT_HOURS=${SESSION_TIMEOUT_HOURS:-24}
      - LOG_LEVEL=${LOG_LEVEL:-info}

volumes:
  pihole-wtm-data:
