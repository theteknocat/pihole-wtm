services:
  pihole-wtm:
    build: .
    container_name: pihole-wtm
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-8080}:80"
    volumes:
      - pihole-wtm-data:/app/data
    environment:
      - PIHOLE_API_URL=${PIHOLE_API_URL:-http://pihole}
      - PIHOLE_API_PASSWORD=${PIHOLE_API_PASSWORD:-}
      - PIHOLE_API_VERSION=${PIHOLE_API_VERSION:-auto}
      - TRACKERDB_UPDATE_INTERVAL_HOURS=${TRACKERDB_UPDATE_INTERVAL_HOURS:-24}
      - DATA_RETENTION_DAYS=${DATA_RETENTION_DAYS:-7}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    networks:
      - default
      - pihole

volumes:
  pihole-wtm-data:

networks:
  pihole:
    name: ${PIHOLE_NETWORK:-pihole_default}
    external: true
