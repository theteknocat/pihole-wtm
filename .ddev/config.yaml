name: pihole-wtm
type: generic
docroot: ""
php_version: "8.3"
webserver_type: generic
nodejs_version: "22"
python_version: "3.12"

web_extra_exposed_ports:
  - name: fastapi
    container_port: 8000
    http_port: 8000
    https_port: 8443
  - name: vite
    container_port: 5173
    http_port: 5173
    https_port: 5174

web_extra_daemons:
  - name: fastapi
    command: >-
      bash -c '
        cd /var/www/html/backend &&
        pip install uv --quiet &&
        uv venv .venv --quiet &&
        uv pip install -e . --python .venv/bin/python --quiet &&
        .venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      '
    directory: /var/www/html/backend

  - name: vite
    command: >-
      bash -c '
        cd /var/www/html/frontend &&
        npm install --silent &&
        npm run dev
      '
    directory: /var/www/html/frontend

web_environment:
  - PIHOLE_API_URL=http://pihole
  - PIHOLE_API_PASSWORD=
  - PIHOLE_API_VERSION=auto
  - TRACKERDB_PATH=/var/www/html/backend/data/trackerdb.db
  - APP_HOST=0.0.0.0
  - APP_PORT=8000
  - LOG_LEVEL=debug

hooks:
  post-start:
    - exec: "mkdir -p /var/www/html/backend/data /var/www/html/backend/tests/fixtures"
